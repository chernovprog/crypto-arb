# =============================================================
# postgresql.conf — PRIMARY node
# =============================================================

# ── Connection ────────────────────────────────────────────────
listen_addresses = '*'
port = 5432
max_connections = 200

# ── Replication ───────────────────────────────────────────────
wal_level = replica              # enables streaming replication
max_wal_senders = 5              # max number of replica connections
max_replication_slots = 5        # persistent replication slots
wal_keep_size = 256MB            # keep recent WAL files for replicas
synchronous_commit = on          # change to 'remote_apply' for sync replication

# ── Write-Ahead Log ───────────────────────────────────────────
wal_compression = on
checkpoint_completion_target = 0.9
min_wal_size = 80MB
max_wal_size = 1GB

# ── Memory ────────────────────────────────────────────────────
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 4MB
maintenance_work_mem = 64MB

# ── Logging ───────────────────────────────────────────────────
log_destination = 'stderr'
logging_collector = off
log_line_prefix = '%t [%p] [%a] %u@%d '
log_connections = on
log_disconnections = on
log_replication_commands = on
log_min_duration_statement = 1000   # log queries taking > 1s

# ── Performance ───────────────────────────────────────────────
random_page_cost = 1.1
effective_io_concurrency = 200
