# =============================================================
# postgresql.conf — REPLICA (hot standby) node
# =============================================================

# ── Connection ────────────────────────────────────────────────
listen_addresses = '*'
port = 5432
max_connections = 200          # must be >= primary's max_connections

# ── Hot Standby ───────────────────────────────────────────────
hot_standby = on               # allow read-only queries on replica
hot_standby_feedback = on      # prevents query conflicts with vacuum on primary

# ── Memory ────────────────────────────────────────────────────
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 4MB
maintenance_work_mem = 64MB

# ── Write-Ahead Log ───────────────────────────────────────────
wal_compression = on

# ── Logging ───────────────────────────────────────────────────
log_destination = 'stderr'
logging_collector = off
log_line_prefix = '%t [%p] [%a] %u@%d '
log_connections = on
log_disconnections = on
log_min_duration_statement = 1000

# ── Performance ───────────────────────────────────────────────
random_page_cost = 1.1
effective_io_concurrency = 200