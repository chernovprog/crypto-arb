name: Crypto-Arb CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build Backend and Run Tests
        run: |
          cd backend
          ./gradlew clean build

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies and Lint
        run: |
          cd frontend
          npm ci --frozen-lockfile
          npm run lint

  build-and-push-images:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    
    env:
      IS_MAIN: ${{ github.base_ref == 'main' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN }}
          
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      # --- BACKEND: BUILD ---
      - name: Build Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: crypto-arb-backend:temp
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- BACKEND: CHECK --- 
      - name: Run Trivy vulnerability scanner on Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'crypto-arb-backend:temp'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'
        
      # --- BACKEND: PUSH ---
      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IS_MAIN == 'true' && format('{0}/crypto-arb-backend:latest', secrets.DOCKERHUB_USERNAME) || format('{0}/crypto-arb-backend:develop', secrets.DOCKERHUB_USERNAME) }}
            ${{ env.IS_MAIN == 'true' && format('{0}/crypto-arb-backend:{1}', secrets.DOCKERHUB_USERNAME, github.ref_name) || format('{0}/crypto-arb-backend:sha-{1}', secrets.DOCKERHUB_USERNAME, github.sha) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # --- FRONTEND (ОНОВЛЕНО) ---
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IS_MAIN == 'true' && format('{0}/crypto-arb-frontend:latest', secrets.DOCKERHUB_USERNAME) || format('{0}/crypto-arb-frontend:develop', secrets.DOCKERHUB_USERNAME) }}
            ${{ env.IS_MAIN == 'true' && format('{0}/crypto-arb-frontend:{1}', secrets.DOCKERHUB_USERNAME, github.ref_name) || format('{0}/crypto-arb-frontend:sha-{1}', secrets.DOCKERHUB_USERNAME, github.sha) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- FLYWAY ---
      - name: Build and push Flyway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./flyway/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IS_MAIN == 'true' && format('{0}/crypto-arb-flyway:latest\n{0}/crypto-arb-flyway:{1}', secrets.DOCKERHUB_USERNAME, github.ref_name) || format('{0}/crypto-arb-flyway:develop\n{0}/crypto-arb-flyway:sha-{1}', secrets.DOCKERHUB_USERNAME, github.sha) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
