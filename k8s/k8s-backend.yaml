apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
      - name: wait-for-redis
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -zvw1 redis-service 6379; do echo "Waiting for Redis..."; sleep 2; done;']
        
      containers:
      - name: backend
        image: crypto-arb-backend:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef: 
            name: arb-config
        - secretRef:
            name: arb-secrets
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 15
