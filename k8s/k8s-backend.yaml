apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: crypto-arb-backend:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef: 
            name: arb-config
        - secretRef:
            name: arb-secrets
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://$(DATABASE_HOST):$(PRIMARY_PORT)/$(DATABASE_NAME)"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom: { secretKeyRef: { name: arb-secrets, key: DATABASE_USERNAME } }
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom: { secretKeyRef: { name: arb-secrets, key: DATABASE_PASSWORD } }
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 15