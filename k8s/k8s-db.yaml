apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: "postgres-service"
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          valueFrom: { configMapKeyRef: { name: arb-config, key: PRIMARY_DATABASE_NAME } }
        - name: POSTGRES_USER
          valueFrom: { secretKeyRef: { name: arb-secrets, key: PRIMARY_DATABASE_USERNAME } }
        - name: POSTGRES_PASSWORD
          valueFrom: { secretKeyRef: { name: arb-secrets, key: PRIMARY_DATABASE_PASSWORD } }
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
