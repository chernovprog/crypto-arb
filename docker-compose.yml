services:
      
  # --- DATABASE ---
  postgres:
    image: postgres:16-alpine
    container_name: postgres-standalone
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    environment:
      POSTGRES_USER: ${PRIMARY_DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${PRIMARY_DATABASE_PASSWORD:-secret}
      POSTGRES_DB: ${PRIMARY_DATABASE_NAME:-mydb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${PRIMARY_DATABASE_PORT:-5432}:5432"
    networks:
      - postgres-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      
  # --- DATABASE MIGRATOR ---
  flyway:
    build:
      context: .
      dockerfile: flyway/Dockerfile
    image: crypto-arb-flyway:latest
    command: -url=jdbc:postgresql://${PRIMARY_DATABASE_HOST}:${PRIMARY_DATABASE_PORT}/${PRIMARY_DATABASE_NAME} -user=${PRIMARY_DATABASE_USERNAME} -password=${PRIMARY_DATABASE_PASSWORD} -connectRetries=60 migrate
    networks:
      - postgres-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    
  # --- CACHE (REDIS) ---
  redis:
    image: redis:7-alpine
    container_name: crypto-arb-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    volumes:
      - redis_data:/data
    networks:
      - postgres-net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    
  # --- BACKEND (SCALED) ---
  backend-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: crypto-arb-backend:latest
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 512M
    networks:
      - postgres-net      
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_FLYWAY_ENABLED=false
      
      - PRIMARY_DATABASE_URL=${PRIMARY_DATABASE_URL}
      - PRIMARY_DATABASE_USERNAME=${PRIMARY_DATABASE_USERNAME}
      - PRIMARY_DATABASE_PASSWORD=${PRIMARY_DATABASE_PASSWORD}
      
      - REPLICA_DATABASE_URL=${REPLICA_DATABASE_URL}
      - REPLICA_DATABASE_USERNAME=${REPLICA_DATABASE_USERNAME}
      - REPLICA_DATABASE_PASSWORD=${REPLICA_DATABASE_PASSWORD}    

      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT}
      - SPRING_DATA_REDIS_DATABASE=${REDIS_DATABASE}
      - SPRING_DATA_REDIS_TIMEOUT=${REDIS_TIMEOUT}
      - SPRING_DATA_REDIS_CONNECT_TIMEOUT=${REDIS_CONNECT_TIMEOUT}
      
      - JWT_SECRET=${JWT_SECRET}
      - COINMARKETCAP_API_KEY=${COINMARKETCAP_API_KEY}
      - JAVA_TOOL_OPTIONS=-Xms512M -Xmx768M -XX:+UseG1GC
    depends_on:
      flyway:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
  
  # --- NGINX (LOAD BALANCER) ---  
  nginx:
    image: crypto-arb-nginx:stable
    container_name: crypto-arb-nginx
    build:
      context: .
      dockerfile: nginx/Dockerfile
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - postgres-net
    ports:
      - "80:80"
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      backend-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  
volumes:
  postgres_data:
  frontend_dist:
  redis_data:

networks:
  postgres-net:
    driver: bridge